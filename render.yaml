databases:
  - name: anaplan-pipeline-db
    plan: free
    databaseName: anaplan_pipeline
    user: anaplan_pipeline_user

services:
  - type: web
    name: anaplan-pipeline-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 120 app:app
    autoDeploy: true
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: anaplan-pipeline-db
          property: connectionString
